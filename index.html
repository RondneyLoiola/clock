<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clocker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./src/css/reset.css">
    <link rel="stylesheet" href="./src/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="nav-bar">
            <h2>CHRONOS</h2>

            <nav>
                <ul>
                    <li class="nav-item active"><i class="fa-solid fa-clock"></i>Home</li>
                    <li class="nav-item"><i class="fa-solid fa-alarm-clock"></i>Alarm</li>
                    <li class="nav-item"><i class="fa-solid fa-hourglass"></i>Timer</li>
                    <li class="nav-item"><i class="fa-solid fa-earth-americas"></i>World Time</li>
                </ul>
            </nav>
        </div>

        <main>
            <div class="clock-container">
                <div class="clock-wrapper">
                    <div class="watch clock active">
                        <div class="time">
                            <h2 class="time-hour">20:47</h2>
                            <span class="time-second">32</span>
                        </div>

                        <div class="date">
                            <h2 class="date-day">THURSDAY</h2>
                            <span class="date-month">May 5, 2026</span>
                        </div>
                    </div>

                    <div class="watch alarm">
                        <div class="alarm-box">
                            <div class="alarm">
                                <h2 class="alarm-time-hour">08:37</h2>
                                <span class="alarm-time-second">32</span>
                            </div>

                            <div class="buttons">
                                <button class="btn-start">Start</button>
                                <button class="btn-pause">Pause</button>
                                <button class="btn-stop">Stop</button>
                            </div>
                        </div>

                        <div class="alarms">
                            <div class="alarm">
                                <h4 class="alarm-hour">05:00</h4>
                                <span class="alarm-name">Focus Sprint</span>
                            </div>

                            <div class="alarm">
                                <h4 class="alarm-hour">15:00</h4>
                                <span class="alarm-name">Meditation</span>
                            </div>

                            <div class="alarm">
                                <h4 class="alarm-hour">20:00</h4>
                                <span class="alarm-name">Review</span>
                            </div>

                            <div class="alarm">
                                <h4 class="alarm-hour">45:00</h4>
                                <span class="alarm-name">Deep Work</span>
                            </div>
                        </div>
                    </div>

                    <div class="watch timer">
                        <div class="timer-box">
                            <div class="timer-time">
                                <h2>00:00</h2>
                                <span>00</span>

                                <div class="timer-buttons">
                                    <button class="btn-start">Start</button>
                                    <button class="btn-pause">Pause</button>
                                    <button class="btn-stop">Stop</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="watch world">
                        <div class="title">
                            <h2 class="world-title">World <span>Clock</span></h2>
                            <p class="world-subtitle"><span></span>SYNCHRONIZED GLOBAL PRECISION</p>
                        </div>

                        <!-- <div class="city">
                            <label for="name">City Name</label>
                            <div>
                                <input id="name" type="text" placeholder="London" class="world-name">
                                <button class="btn-search">Search</button>
                            </div>
                        </div> -->

                        <div class="box-world">
                            <div class="city-name">
                                <div class="city-info">
                                    <div class="info-name">
                                        <h2>LONDOM</h2>
                                        <div>
                                            <p>GMT +00:00</p>
                                            <p>•</p>
                                            <p>UNITED KINGDOM</p>
                                        </div>
                                    </div>

                                    <div class="world-flag">
                                        <i class="fa-solid fa-globe"></i>
                                    </div>
                                </div>

                                <div class="city-info2">
                                    <div class="city-time">
                                        <h3 class="city-hour">14:42</h3>
                                        <span class="city-second">PM</span>
                                    </div>

                                    <div class="city-temp">
                                        <h3 class="city-temp">24</h3>
                                        <span>°C</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
<script src="./src/js/script.js"></script>
</html>
